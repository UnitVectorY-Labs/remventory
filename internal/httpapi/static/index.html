<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remventory</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-live="polite">
        <header class="topbar">
          <div class="identity">
            <img id="remy-avatar" class="remy-avatar" src="/static/remy-ready.svg" alt="Remy the hamster librarian is ready">
            <div>
            <p class="eyebrow">Remventory</p>
            <h1>Remy</h1>
            <p class="tagline">Your inventory librarian</p>
            </div>
          </div>
          <div class="topbar-actions">
            <button id="new-chat" class="secondary new-chat" type="button">New chat</button>
            <div id="state" class="state">Ready</div>
          </div>
        </header>

		<section id="configuration-warning" class="configuration-warning" hidden></section>

        <section id="stage" class="stage">
          <div class="empty">
            <h2>What are we inventorying?</h2>
            <p>Try “I want to track my LEGO sets”, then approve the category and add an item.</p>
          </div>
        </section>

        <form id="remy-form" class="composer">
          <textarea id="message" name="message" rows="3" placeholder="Ask Remy to track, add, update, remove, or show inventory" required></textarea>
          <div class="composer-actions">
            <p>Enter to send · Shift+Enter for a new line</p>
            <button id="send-request" type="submit">Send</button>
          </div>
        </form>

        <section id="processing" class="processing" aria-live="polite" hidden>
          <div>
            <p class="eyebrow">Remy is working</p>
            <p id="processing-message" class="processing-message"></p>
          </div>
          <button id="stop-request" class="danger" type="button">Stop</button>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
