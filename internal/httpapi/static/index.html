<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remventory</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="remy-panel">
          <img id="remy-avatar" class="remy-avatar" src="/static/remy-ready.svg" alt="Remy is ready">
          <div class="remy-dialog" role="status" aria-live="polite" aria-atomic="true">
            <p id="remy-dialog">Hi, I'm Remy. How can I help you manage your inventory.</p>
          </div>
          <button id="new-chat" class="icon-button secondary" type="button" aria-label="Start a new chat" title="Start a new chat">
            <svg class="icon icon-tabler" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </header>

        <section id="configuration-warning" class="configuration-warning" hidden></section>

        <section id="stage" class="stage" aria-live="polite">
          <div class="empty">
            <h2>Your inventory workspace</h2>
            <p>Inventory details, search results, and proposals will appear here.</p>
          </div>
        </section>

        <div class="request-controls">
          <form id="remy-form" class="composer">
            <textarea id="message" name="message" rows="2" placeholder="Ask Remy about your inventory" aria-label="Message Remy" required></textarea>
            <div id="submitted-message" class="submitted-message" role="status" aria-label="Submitted request" hidden></div>
            <div class="composer-actions">
              <p id="composer-hint">Enter to send · Shift+Enter for a new line</p>
              <div class="request-action-slot">
                <button id="send-request" type="submit">
                  <span>Send</span>
                  <svg class="icon icon-tabler" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
                </button>
                <button id="stop-request" class="danger" type="button" hidden>
                  <svg class="icon icon-tabler" viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
                  <span>Stop</span>
                </button>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
