name: Build and Push Docker Image on Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    permissions:
      artifact-metadata: write
      id-token: write
      contents: read
      attestations: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      run: |
        echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Extract arch-specific tags
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ghcr.io/${{ env.REPO_LC }}
        flavor: |
          suffix=-${{ matrix.arch }},onlatest=true
        tags: |
          type=semver,pattern=v{{version}}
          type=semver,pattern=v{{major}}.{{minor}}
          type=semver,pattern=v{{major}}

    - name: Build and push Docker image (single arch)
      id: push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        push: true
        platforms: linux/${{ matrix.arch }}
        tags: ${{ steps.meta.outputs.tags }}
        build-args: |
          VERSION=${{ github.ref_name }}

    - name: Generate artifact attestation (${{ matrix.arch }})
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-name: ghcr.io/${{ env.REPO_LC }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  manifest:
    needs: build-and-push
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      artifact-metadata: write
      id-token: write
      contents: read
      attestations: write
      packages: write

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      run: |
        echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Extract multi-arch tags
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ghcr.io/${{ env.REPO_LC }}
        tags: |
          type=semver,pattern=v{{version}}
          type=semver,pattern=v{{major}}.{{minor}}
          type=semver,pattern=v{{major}}

    - name: Create and push multi-arch manifest
      id: push
      shell: bash
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
        META_VERSION: ${{ steps.meta.outputs.version }}
      run: |
        IMAGE="ghcr.io/${REPO_LC}"

        TAG_ARGS=""
        while IFS= read -r tag; do
          [ -n "${tag}" ] && TAG_ARGS="${TAG_ARGS} -t ${tag}"
        done <<< "${TAGS}"

        docker buildx imagetools create \
          ${TAG_ARGS} \
          "${IMAGE}:${META_VERSION}-amd64" \
          "${IMAGE}:${META_VERSION}-arm64"

        DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${META_VERSION}" --format '{{json .Manifest.Digest}}' | jq -r '.')
        echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-name: ghcr.io/${{ env.REPO_LC }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true